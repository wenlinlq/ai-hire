<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>登录注册 - AI招聘平台</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            colors: {
              primary: {
                50: "#fefaf6",
                100: "#fdf5ee",
                200: "#f9e8d8",
                300: "#f2d0b0",
                400: "#e9b888",
                500: "#dd9f60",
                600: "#c98a48",
                700: "#a87038",
                800: "#8c5c2c",
                900: "#734b23",
              },
              accent: {
                50: "#f7f8f4",
                100: "#edf0e6",
                200: "#dce3cd",
                300: "#c0cba0",
                400: "#a1ae78",
                500: "#829150",
                600: "#69773e",
              },
              neutral: {
                50: "#f9f9f7",
                100: "#f2f2f0",
                200: "#e6e6e3",
                300: "#d1d1cc",
                400: "#b0b0a9",
                500: "#8f8f87",
                600: "#707069",
                700: "#50504a",
                800: "#33332f",
                900: "#20201d",
              },
            },
          },
        },
      };
    </script>
    <style>
      .auth-tab {
        display: none;
      }
      .auth-tab.active {
        display: block;
      }
      .tab-btn.active {
        color: #dd9f60;
        border-bottom: 2px solid #dd9f60;
      }
    </style>
  </head>
  <body class="bg-neutral-50 text-neutral-700 min-h-screen flex flex-col">
    <!-- 页面内容 -->
    <main class="flex-1 flex items-center justify-center py-16">
      <div class="max-w-3xl mx-auto px-4 sm:px-6 lg:px-8 w-full">
        <!-- 品牌标识 -->
        <div class="text-center mb-8">
          <div class="flex items-center justify-center space-x-2 mb-2">
            <svg
              class="w-10 h-10 text-primary-600"
              fill="currentColor"
              viewBox="0 0 24 24"
            >
              <path
                d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"
              />
            </svg>
            <span class="text-2xl font-bold text-neutral-800">AI招聘</span>
          </div>
          <p class="text-neutral-600">智能连接人才与未来</p>
        </div>
        <div
          class="bg-white rounded-xl shadow-md border border-neutral-200 overflow-hidden"
        >
          <!-- 标签切换 -->
          <div class="border-b border-neutral-200">
            <div class="flex">
              <button
                class="tab-btn active flex-1 py-4 text-center font-semibold transition-colors"
                data-tab="login"
              >
                登录
              </button>
              <button
                class="tab-btn flex-1 py-4 text-center font-semibold transition-colors"
                data-tab="register"
              >
                注册
              </button>
            </div>
          </div>

          <!-- 登录表单 -->
          <div id="login" class="auth-tab active p-8">
            <h2 class="text-2xl font-bold text-neutral-800 mb-6">账号登录</h2>
            <form class="space-y-6">
              <div>
                <label class="block text-sm font-medium text-neutral-700 mb-2"
                  >用户名</label
                >
                <input
                  type="text"
                  class="w-full px-4 py-3 border border-neutral-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-primary-500"
                  placeholder="请输入用户名"
                />
              </div>
              <div>
                <label class="block text-sm font-medium text-neutral-700 mb-2"
                  >密码</label
                >
                <input
                  type="password"
                  class="w-full px-4 py-3 border border-neutral-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-primary-500"
                  placeholder="请输入密码"
                />
              </div>
              <div class="flex items-center justify-between">
                <div class="flex items-center">
                  <input
                    id="remember"
                    type="checkbox"
                    class="h-4 w-4 text-primary-600 focus:ring-primary-500 border-neutral-300 rounded"
                  />
                  <label
                    for="remember"
                    class="ml-2 block text-sm text-neutral-600"
                    >记住我</label
                  >
                </div>
                <a
                  href="#"
                  class="text-sm text-primary-600 hover:text-primary-700"
                  >忘记密码？</a
                >
              </div>
              <div>
                <button
                  type="submit"
                  class="w-full bg-primary-500 hover:bg-primary-600 text-white font-semibold py-3 px-4 rounded-lg transition-colors"
                >
                  登录
                </button>
              </div>
            </form>
          </div>

          <!-- 注册表单 -->
          <div id="register" class="auth-tab p-8">
            <h2 class="text-2xl font-bold text-neutral-800 mb-6">账号注册</h2>
            <form class="space-y-6">
              <div>
                <label class="block text-sm font-medium text-neutral-700 mb-2"
                  >手机号</label
                >
                <div class="flex space-x-4">
                  <input
                    type="tel"
                    class="flex-1 px-4 py-3 border border-neutral-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-primary-500"
                    placeholder="请输入手机号"
                  />
                  <button
                    type="button"
                    class="px-4 py-3 bg-neutral-100 hover:bg-neutral-200 text-neutral-700 font-medium rounded-lg transition-colors whitespace-nowrap"
                  >
                    获取验证码
                  </button>
                </div>
              </div>
              <div>
                <label class="block text-sm font-medium text-neutral-700 mb-2"
                  >验证码</label
                >
                <input
                  type="text"
                  class="w-full px-4 py-3 border border-neutral-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-primary-500"
                  placeholder="请输入验证码"
                />
              </div>
              <div>
                <label class="block text-sm font-medium text-neutral-700 mb-2"
                  >密码</label
                >
                <input
                  type="password"
                  class="w-full px-4 py-3 border border-neutral-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-primary-500"
                  placeholder="请设置密码"
                />
              </div>
              <div>
                <label class="block text-sm font-medium text-neutral-700 mb-2"
                  >确认密码</label
                >
                <input
                  type="password"
                  class="w-full px-4 py-3 border border-neutral-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-primary-500"
                  placeholder="请确认密码"
                />
              </div>
              <div class="flex items-center">
                <input
                  id="agree"
                  type="checkbox"
                  class="h-4 w-4 text-primary-600 focus:ring-primary-500 border-neutral-300 rounded"
                />
                <label for="agree" class="ml-2 block text-sm text-neutral-600">
                  我已阅读并同意
                  <a href="#" class="text-primary-600 hover:text-primary-700"
                    >《用户协议》</a
                  >
                  和
                  <a href="#" class="text-primary-600 hover:text-primary-700"
                    >《隐私政策》</a
                  >
                </label>
              </div>
              <div>
                <button
                  type="submit"
                  class="w-full bg-primary-500 hover:bg-primary-600 text-white font-semibold py-3 px-4 rounded-lg transition-colors"
                >
                  注册
                </button>
              </div>
            </form>
          </div>
        </div>
      </div>
    </main>

    <script>
      // 标签切换功能
      document.addEventListener("DOMContentLoaded", function () {
        const tabBtns = document.querySelectorAll(".tab-btn");
        const authTabs = document.querySelectorAll(".auth-tab");

        tabBtns.forEach((btn) => {
          btn.addEventListener("click", function () {
            const tabId = this.getAttribute("data-tab");

            // 移除所有活动状态
            tabBtns.forEach((b) => b.classList.remove("active"));
            authTabs.forEach((t) => t.classList.remove("active"));

            // 添加当前活动状态
            this.classList.add("active");
            document.getElementById(tabId).classList.add("active");
          });
        });

        // 验证码倒计时功能
        const getCodeBtn = document.querySelector('button[type="button"]');
        if (getCodeBtn) {
          getCodeBtn.addEventListener("click", function () {
            let countdown = 60;
            this.disabled = true;
            this.classList.add("bg-neutral-200");
            this.classList.remove("bg-neutral-100", "hover:bg-neutral-200");
            this.textContent = `${countdown}秒后重新获取`;

            const timer = setInterval(() => {
              countdown--;
              this.textContent = `${countdown}秒后重新获取`;
              if (countdown <= 0) {
                clearInterval(timer);
                this.disabled = false;
                this.classList.remove("bg-neutral-200");
                this.classList.add("bg-neutral-100", "hover:bg-neutral-200");
                this.textContent = "获取验证码";
              }
            }, 1000);
          });
        }
      });
    </script>
  </body>
</html>
